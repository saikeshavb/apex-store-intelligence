version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: apex_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  api:
    build: ./api_server
    container_name: apex_api
    ports:
      - "5001:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/
    depends_on:
      - mongodb
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: apex_frontend
    ports:
      - "8501:8501"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  mongodb_data: