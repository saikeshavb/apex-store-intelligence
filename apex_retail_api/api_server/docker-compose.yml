version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: apex_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  api:
    build: .
    container_name: apex_api
    ports:
      # CHANGED: Map host port 5001 to container port 5000
      - "5001:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/
    depends_on:
      - mongodb
    restart: unless-stopped

volumes:
  mongodb_data: